<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Mein AR Arbeitsplatz</title>

  <!-- A-Frame & AR.js laden -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    .info {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 8px 12px;
      border-radius: 6px;
      font-family: system-ui, sans-serif;
      font-size: 12px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="info">
    <div><b>AR Arbeitsplatz</b></div>
    <div>1. Kamera-Zugriff erlauben</div>
    <div>2. Auf Hiro-Marker richten</div>
  </div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    arjs="sourceType: webcam; debugUIEnabled: false;">

    <!-- Marker (Hiro) -->
    <a-marker preset="hiro">

      <!-- "Racer" (Platzhalter als rotes Auto-ähnliches Objekt) -->
      <a-box position="0 0.25 0" depth="0.8" height="0.2" width="0.4" color="#ff0000"></a-box>
      <a-box position="0 0.35 0.15" depth="0.3" height="0.2" width="0.4" color="#aa0000"></a-box>

      <!-- Räder -->
      <a-cylinder position="-0.2 0 0.3" radius="0.08" height="0.05" rotation="90 0 0" color="#222"></a-cylinder>
      <a-cylinder position="0.2 0 0.3" radius="0.08" height="0.05" rotation="90 0 0" color="#222"></a-cylinder>
      <a-cylinder position="-0.2 0 -0.3" radius="0.08" height="0.05" rotation="90 0 0" color="#222"></a-cylinder>
      <a-cylinder position="0.2 0 -0.3" radius="0.08" height="0.05" rotation="90 0 0" color="#222"></a-cylinder>

      <!-- Beispiel-Pfeil (Motor) -->
      <a-entity position="0 0.4 -0.4">
        <!-- Schaft -->
        <a-cylinder height="0.3" radius="0.01" color="#00ff00" rotation="0 0 90" position="0.15 0 0"></a-cylinder>
        <!-- Spitze -->
        <a-cone height="0.08" radius-bottom="0.04" radius-top="0"
                color="#00ff00" rotation="0 0 90" position="0.3 0 0"></a-cone>
        <!-- Text -->
        <a-text value="Motor" color="#00ff00"
                position="0 0.1 0"
                align="center"
                width="1.5"
                look-at="[camera]"></a-text>
      </a-entity>

      <!-- Beispiel-Pfeil (Spoiler) -->
      <a-entity position="0 0.5 0.4">
        <a-cylinder height="0.3" radius="0.01" color="#0000ff" rotation="0 0 -90" position="-0.15 0 0"></a-cylinder>
        <a-cone height="0.08" radius-bottom="0.04" radius-top="0"
                color="#0000ff" rotation="0 0 -90" position="-0.3 0 0"></a-cone>
        <a-text value="Spoiler" color="#0000ff"
                position="0 0.1 0"
                align="center"
                width="1.5"
                look-at="[camera]"></a-text>
      </a-entity>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
